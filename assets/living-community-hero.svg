<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1320 980" role="img" aria-labelledby="title desc">
  <title id="title">From one great host to a living pickleball community</title>
  <desc id="desc">A premium public-safe visual showing one pickleball host growing events through followers, warm invitations, and friend referrals.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset=".48" stop-color="#edf6ff"/>
      <stop offset="1" stop-color="#e8fff7"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#5c8eff"/>
      <stop offset="1" stop-color="#244bb3"/>
    </linearGradient>
    <linearGradient id="mint" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#85e2d2"/>
      <stop offset="1" stop-color="#2fa890"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ffe397"/>
      <stop offset="1" stop-color="#e5a625"/>
    </linearGradient>
    <linearGradient id="pink" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ff6ee4"/>
      <stop offset="1" stop-color="#d900ba"/>
    </linearGradient>
    <filter id="deepShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="34" stdDeviation="34" flood-color="#244bb3" flood-opacity=".18"/>
    </filter>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="170%">
      <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#244bb3" flood-opacity=".16"/>
    </filter>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1320" height="980" rx="72" fill="url(#bg)"/>
