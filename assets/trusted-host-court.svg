<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1320 980" role="img" aria-labelledby="title desc">
  <title id="title">A hosted pickleball event filling with followers and referrals</title>
  <desc id="desc">A warm illustrated indoor pickleball court scene with a host welcoming players and small friend groups into an event.</desc>
  <defs>
    <linearGradient id="sky" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f9fcff"/>
      <stop offset=".55" stop-color="#eef6ff"/>
      <stop offset="1" stop-color="#e9fff8"/>
    </linearGradient>
    <linearGradient id="court" x1=".1" x2=".9" y1="0" y2="1">
      <stop offset="0" stop-color="#dff0ff"/>
      <stop offset=".55" stop-color="#f9fcff"/>
      <stop offset="1" stop-color="#e2fbf4"/>
    </linearGradient>
    <linearGradient id="floor" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f7fbff"/>
      <stop offset="1" stop-color="#dfefff"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#5f90ff"/>
      <stop offset="1" stop-color="#244bb3"/>
    </linearGradient>
    <linearGradient id="mint" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#8ce5d4"/>
      <stop offset="1" stop-color="#35a992"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ffe38c"/>
      <stop offset="1" stop-color="#e6a825"/>
    </linearGradient>
    <linearGradient id="magenta" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ff72e6"/>
      <stop offset="1" stop-color="#d800b9"/>
    </linearGradient>
    <radialGradient id="warmLight" cx=".48" cy=".38" r=".58">
      <stop offset="0" stop-color="#fff5d6" stop-opacity=".85"/>
      <stop offset=".5" stop-color="#eaf2ff" stop-opacity=".12"/>
      <stop offset="1" stop-color="#eaf2ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-40%" y="-40%" width="180%" height="190%">
      <feDropShadow dx="0" dy="20" stdDeviation="18" flood-color="#244bb3" flood-opacity=".16"/>
    </filter>
    <filter id="deepShadow" x="-35%" y="-35%" width="170%" height="180%">
      <feDropShadow dx="0" dy="34" stdDeviation="32" flood-color="#244bb3" flood-opacity=".18"/>
    </filter>
    <filter id="floorShadow" x="-50%" y="-50%" width="200%" height="220%">
      <feDropShadow dx="0" dy="18" stdDeviation="10" flood-color="#0f2a70" flood-opacity=".15"/>
    </filter>
    <clipPath id="courtClip">
      <path d="M132 220h1056c52 0 94 42 94 94v430c0 52-42 94-94 94H132c-52 0-94-42-94-94V314c0-52 42-94 94-94Z"/>
    </clipPath>
  </defs>

  <rect width="1320" height="980" rx="72" fill="url(#sky)"/>
  <rect width="1320" height="980" rx="72" fill="url(#warmLight)"/>

  <g clip-path="url(#courtClip)">
    <rect x="38" y="220" width="1244" height="618" rx="94" fill="url(#court)"/>
    <path d="M-18 840 202 486h916l220 354Z" fill="url(#floor)" opacity=".92"/>
    <path d="M232 486h856M166 592h988M98 722h1124M356 486 246 838M660 486v352M964 486l110 352" fill="none" stroke="#c7ddff" stroke-width="5" opacity=".85"/>
    <path d="M232 486h856" stroke="#244bb3" stroke-width="9" opacity=".28"/>
    <path d="M220 506h880" stroke="#ffffff" stroke-width="8" opacity=".9"/>
    <path d="M214 486v84M1106 486v84" stroke="#244bb3" stroke-linecap="round" stroke-width="10" opacity=".35"/>
  </g>

  <g opacity=".5">
    <circle cx="210" cy="170" r="82" fill="#ffffff"/>
    <circle cx="1094" cy="170" r="104" fill="#ffffff"/>
    <circle cx="1134" cy="790" r="112" fill="#e8fff7"/>
    <circle cx="168" cy="772" r="96" fill="#eaf2ff"/>
  </g>

  <g filter="url(#deepShadow)">
    <ellipse cx="660" cy="642" rx="220" ry="58" fill="#244bb3" opacity=".08"/>
  </g>

  <g id="host" filter="url(#floorShadow)">
    <ellipse cx="660" cy="646" rx="92" ry="26" fill="#244bb3" opacity=".13"/>
    <circle cx="660" cy="382" r="42" fill="url(#gold)"/>
    <path d="M612 464c0-46 28-78 48-78s48 32 48 78v104c0 18-15 33-33 33h-30c-18 0-33-15-33-33Z" fill="url(#blue)"/>
    <path d="M612 488c-58 16-104 54-132 108" fill="none" stroke="#244bb3" stroke-linecap="round" stroke-width="22"/>
    <path d="M708 488c58 16 104 54 132 108" fill="none" stroke="#244bb3" stroke-linecap="round" stroke-width="22"/>
    <path d="M628 608 592 706M692 608l38 98" stroke="#244bb3" stroke-linecap="round" stroke-width="24"/>
    <ellipse cx="570" cy="728" rx="42" ry="16" fill="#0f2a70" opacity=".2"/>
    <ellipse cx="750" cy="728" rx="42" ry="16" fill="#0f2a70" opacity=".2"/>
    <circle cx="488" cy="606" r="20" fill="url(#mint)"/>
    <circle cx="832" cy="606" r="20" fill="url(#mint)"/>
  </g>

  <g id="left-group" filter="url(#softShadow)">
    <ellipse cx="316" cy="680" rx="132" ry="34" fill="#244bb3" opacity=".08"/>
    <g>
      <circle cx="268" cy="514" r="34" fill="url(#mint)"/>
      <path d="M230 590c0-42 24-70 38-70 17 0 42 28 42 70v70c0 17-14 31-31 31h-18c-17 0-31-14-31-31Z" fill="url(#mint)"/>
      <path d="M238 624 200 690M302 624l46 62" stroke="#248c7d" stroke-linecap="round" stroke-width="18"/>
    </g>
    <g>
      <circle cx="370" cy="538" r="32" fill="url(#blue)"/>
      <path d="M334 610c0-40 22-67 37-67s40 27 40 67v64c0 17-14 31-31 31h-15c-17 0-31-14-31-31Z" fill="url(#blue)"/>
      <path d="M342 642 306 704M403 642l44 58" stroke="#244bb3" stroke-linecap="round" stroke-width="17"/>
    </g>
    <ellipse cx="198" cy="704" rx="42" ry="22" transform="rotate(-18 198 704)" fill="url(#gold)"/>
    <path d="M224 688 286 626" stroke="#e6a825" stroke-linecap="round" stroke-width="10"/>
  </g>

  <g id="right-group" filter="url(#softShadow)">
    <ellipse cx="1016" cy="674" rx="136" ry="34" fill="#244bb3" opacity=".08"/>
    <g>
      <circle cx="970" cy="516" r="34" fill="url(#gold)"/>
      <path d="M930 592c0-42 24-70 39-70s42 28 42 70v70c0 17-14 31-31 31h-19c-17 0-31-14-31-31Z" fill="url(#gold)"/>
      <path d="M940 626 904 692M1002 626l46 62" stroke="#c88b15" stroke-linecap="round" stroke-width="18"/>
    </g>
    <g>
      <circle cx="1072" cy="538" r="32" fill="url(#mint)"/>
      <path d="M1036 610c0-40 22-67 37-67s40 27 40 67v64c0 17-14 31-31 31h-15c-17 0-31-14-31-31Z" fill="url(#mint)"/>
      <path d="M1044 642 1008 704M1105 642l44 58" stroke="#248c7d" stroke-linecap="round" stroke-width="17"/>
    </g>
    <ellipse cx="1154" cy="704" rx="42" ry="22" transform="rotate(18 1154 704)" fill="url(#magenta)"/>
    <path d="M1126 688 1066 626" stroke="#d800b9" stroke-linecap="round" stroke-width="10"/>
  </g>

  <g id="back-pair" filter="url(#softShadow)" opacity=".95">
    <ellipse cx="660" cy="310" rx="138" ry="30" fill="#244bb3" opacity=".07"/>
    <g>
      <circle cx="584" cy="196" r="27" fill="url(#blue)"/>
      <path d="M554 252c0-34 18-57 31-57s33 23 33 57v52c0 15-12 27-27 27h-10c-15 0-27-12-27-27Z" fill="url(#blue)"/>
      <path d="M560 282 532 334M612 282l34 48" stroke="#244bb3" stroke-linecap="round" stroke-width="14"/>
    </g>
    <g>
      <circle cx="736" cy="196" r="27" fill="url(#mint)"/>
      <path d="M706 252c0-34 18-57 31-57s33 23 33 57v52c0 15-12 27-27 27h-10c-15 0-27-12-27-27Z" fill="url(#mint)"/>
      <path d="M712 282 684 334M764 282l34 48" stroke="#248c7d" stroke-linecap="round" stroke-width="14"/>
    </g>
    <path d="M640 216c12 18 28 18 40 0" fill="none" stroke="#f0b83c" stroke-linecap="round" stroke-width="12"/>
  </g>

  <g id="front-friends" filter="url(#softShadow)">
    <ellipse cx="660" cy="842" rx="214" ry="42" fill="#244bb3" opacity=".08"/>
    <g>
      <circle cx="554" cy="706" r="31" fill="url(#blue)"/>
      <path d="M520 774c0-38 21-64 35-64s38 26 38 64v58c0 16-13 29-29 29h-15c-16 0-29-13-29-29Z" fill="url(#blue)"/>
      <path d="M528 804 494 858M584 804l40 52" stroke="#244bb3" stroke-linecap="round" stroke-width="16"/>
    </g>
    <g>
      <circle cx="660" cy="724" r="34" fill="url(#gold)"/>
      <path d="M622 798c0-42 24-70 39-70s41 28 41 70v62c0 17-14 31-31 31h-18c-17 0-31-14-31-31Z" fill="url(#gold)"/>
      <path d="M632 832 596 892M692 832l42 56" stroke="#c88b15" stroke-linecap="round" stroke-width="18"/>
    </g>
    <g>
      <circle cx="770" cy="706" r="31" fill="url(#magenta)"/>
      <path d="M736 774c0-38 21-64 35-64s38 26 38 64v58c0 16-13 29-29 29h-15c-16 0-29-13-29-29Z" fill="url(#magenta)"/>
      <path d="M744 804 710 858M800 804l40 52" stroke="#c000a5" stroke-linecap="round" stroke-width="16"/>
    </g>
  </g>

  <g opacity=".72">
    <path d="M430 394c54-54 116-86 186-96M704 300c70 12 132 44 186 96M422 722c60-44 118-70 174-78M724 644c56 8 114 34 174 78" fill="none" stroke="#ffffff" stroke-linecap="round" stroke-width="12"/>
    <circle cx="410" cy="408" r="13" fill="#49b4a0"/>
    <circle cx="910" cy="408" r="13" fill="#f0b83c"/>
    <circle cx="400" cy="734" r="13" fill="#2f6bff"/>
    <circle cx="920" cy="734" r="13" fill="#f000c8"/>
  </g>
</svg>
