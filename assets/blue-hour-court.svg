<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1040" role="img" aria-labelledby="title desc">
  <title id="title">Blue hour pickleball court ready for a great game</title>
  <desc id="desc">A premium illustrated pickleball court with four glowing paddle and ball marks, built as a public-safe landing page hero.</desc>
  <defs>
    <linearGradient id="night" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#163c99"/>
      <stop offset=".52" stop-color="#0c2b7a"/>
      <stop offset="1" stop-color="#06133e"/>
    </linearGradient>
    <linearGradient id="court" x1=".1" x2=".9" y1="0" y2="1">
      <stop offset="0" stop-color="#2f6bff"/>
      <stop offset=".5" stop-color="#173fbd"/>
      <stop offset="1" stop-color="#0b2165"/>
    </linearGradient>
    <radialGradient id="light" cx=".42" cy=".28" r=".58">
      <stop offset="0" stop-color="#fff1b8" stop-opacity=".85"/>
      <stop offset=".3" stop-color="#49b4a0" stop-opacity=".22"/>
      <stop offset="1" stop-color="#06133e" stop-opacity="0"/>
    </radialGradient>
    <filter id="blurGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="170%">
      <feDropShadow dx="0" dy="38" stdDeviation="32" flood-color="#00081f" flood-opacity=".42"/>
    </filter>
  </defs>

  <rect width="1600" height="1040" fill="url(#night)"/>
  <rect width="1600" height="1040" fill="url(#light)"/>

  <g transform="translate(164 86)" filter="url(#shadow)">
    <path d="M132 110h970c82 0 148 66 148 148v430c0 82-66 148-148 148H132C50 836-16 770-16 688V258C-16 176 50 110 132 110Z" fill="url(#court)"/>
    <path d="M80 234h1076M80 470h1076M80 706h1076M302 162v592M618 162v592M934 162v592" fill="none" stroke="#ffd36c" stroke-width="6" opacity=".9"/>
    <path d="M618 162v592" stroke="#ffffff" stroke-width="7" opacity=".82"/>
    <path d="M80 470h1076" stroke="#ffffff" stroke-width="7" opacity=".7"/>
    <path d="M82 234h1072M82 706h1072" stroke="#49b4a0" stroke-width="5" opacity=".55"/>
    <path d="M302 162v592M934 162v592" stroke="#49b4a0" stroke-width="5" opacity=".42"/>

    <g opacity=".32">
      <circle cx="120" cy="176" r="96" fill="#fff"/>
      <circle cx="1100" cy="178" r="112" fill="#fff"/>
      <circle cx="1120" cy="716" r="132" fill="#49b4a0"/>
      <circle cx="128" cy="718" r="116" fill="#2f6bff"/>
    </g>

    <g filter="url(#blurGlow)">
      <g transform="translate(412 360) rotate(-15)">
        <ellipse cx="0" cy="0" rx="62" ry="27" fill="#f8fbff"/>
        <circle cx="-76" cy="-12" r="24" fill="#f0b83c"/>
      </g>
      <g transform="translate(836 360) rotate(15)">
        <ellipse cx="0" cy="0" rx="62" ry="27" fill="#f8fbff"/>
        <circle cx="76" cy="-12" r="24" fill="#49b4a0"/>
      </g>
      <g transform="translate(412 604) rotate(14)">
        <ellipse cx="0" cy="0" rx="62" ry="27" fill="#f8fbff"/>
        <circle cx="-76" cy="12" r="24" fill="#2f6bff"/>
      </g>
      <g transform="translate(836 604) rotate(-14)">
        <ellipse cx="0" cy="0" rx="62" ry="27" fill="#f8fbff"/>
        <circle cx="76" cy="12" r="24" fill="#f000c8"/>
      </g>
    </g>
  </g>
</svg>
