<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Give n Take helps pickleball hosts create the feeling people come back for, create the connection high from the heart, stay connected, invite followers to experiences, grow through referrals, and turn followers into connection leaders."
    />
    <title>Give n Take</title>
    <link rel="stylesheet" href="./styles.css?v=20260620-2" />
  </head>
  <body>
    <main class="landing">
      <img class="hero-image" src="./assets/hero-indoor-club.jpg?v=20260622-circle" alt="" />

      <nav class="nav" aria-label="Primary">
        <a class="brand" href="#top" aria-label="Give n Take home">
          <span class="brand-mark">GnT</span>
          <span>Give n Take</span>
        </a>
      </nav>

      <section class="hero" id="top" aria-label="Give n Take landing page">
        <div class="hero-copy">
          <h1>
            <span>The feeling people come back for.</span>
          </h1>

          <ol class="host-loop" aria-label="The Give n Take host loop">
            <li class="host-step">
              <span class="step-top">
                <span class="step-number">01</span>
                <span class="step-icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24" focusable="false">
                    <path d="M12 20.2s-7.1-4.4-9.1-9.2c-1.1-2.8.7-5.4 3.6-5.4 1.8 0 3.3 1 4.2 2.3L12 9.7l1.3-1.8c.9-1.3 2.4-2.3 4.2-2.3 2.9 0 4.7 2.6 3.6 5.4-2 4.8-9.1 9.2-9.1 9.2Z" />
                  </svg>
                </span>
              </span>
              <span class="step-label">Create the connection high from the heart</span>
            </li>
            <li class="host-step">
              <span class="step-top">
                <span class="step-number">02</span>
                <span class="step-icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24" focusable="false">
                    <path d="M7.2 12.2a4.1 4.1 0 0 1 5.8-5.8l1.2 1.2" />
                    <path d="M16.8 11.8a4.1 4.1 0 0 1-5.8 5.8l-1.2-1.2" />
                    <path d="m9.6 14.4 4.8-4.8" />
                  </svg>
                </span>
              </span>
              <span class="step-label">Stay connected</span>
            </li>
            <li class="host-step">
              <span class="step-top">
                <span class="step-number">03</span>
                <span class="step-icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24" focusable="false">
                    <path d="M5 6.7h14v12.1H5Z" />
                    <path d="M8 4.5v4" />
                    <path d="M16 4.5v4" />
                    <path d="M5 10h14" />
                    <path d="m8.3 15 2.2 2.1 5.1-5.1" />
                  </svg>
                </span>
              </span>
              <span class="step-label">Invite followers to next experience</span>
            </li>
            <li class="host-step">
              <span class="step-top">
                <span class="step-number">04</span>
                <span class="step-icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24" focusable="false">
                    <path d="M5 12h5.2c2.7 0 3.3-4.3 5.8-4.3H19" />
                    <path d="m16 4.7 3 3-3 3" />
                    <path d="M5 12h5.2c2.7 0 3.3 4.3 5.8 4.3H19" />
                    <path d="m16 13.3 3 3-3 3" />
                  </svg>
                </span>
              </span>
              <span class="step-label">Grow through referrals</span>
            </li>
            <li class="host-step">
              <span class="step-top">
                <span class="step-number">05</span>
                <span class="step-icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24" focusable="false">
                    <path d="M12 7.5a3 3 0 1 0 0 6 3 3 0 0 0 0-6Z" />
                    <path d="M5.2 15.2a2.4 2.4 0 1 0 0-4.8 2.4 2.4 0 0 0 0 4.8Z" />
                    <path d="M18.8 15.2a2.4 2.4 0 1 0 0-4.8 2.4 2.4 0 0 0 0 4.8Z" />
                    <path d="M7.4 12.8h2" />
                    <path d="M14.6 12.8h2" />
                    <path d="M8.1 18.7c.7-1.8 2-2.8 3.9-2.8s3.2 1 3.9 2.8" />
                  </svg>
                </span>
              </span>
              <span class="step-label">Turn followers into connection leaders</span>
            </li>
          </ol>

          <form
            class="access"
            id="early-list"
            action="https://formsubmit.co/hello@gnt.ai"
            method="post"
          >
            <label for="email">Want in</label>
            <input type="hidden" name="_subject" value="New Give n Take waitlist signup" />
            <input type="hidden" name="_template" value="table" />
            <input type="hidden" name="_captcha" value="false" />
            <input type="hidden" name="_url" value="https://gnt.ai/" />
            <input class="hp-field" type="text" name="_honey" tabindex="-1" autocomplete="off" aria-hidden="true" />
            <div class="access-row">
              <input id="email" name="email" type="email" autocomplete="email" placeholder="Email address" required />
              <button class="button" type="submit">Join the List</button>
            </div>
            <p class="form-status" id="form-status" role="status" aria-live="polite"></p>
          </form>
        </div>
      </section>
    </main>
    <script>
      const form = document.querySelector("#early-list");
      const emailInput = document.querySelector("#email");
      const status = document.querySelector("#form-status");
      const button = form.querySelector("button");
      const submitEndpoint = "https://formsubmit.co/ajax/hello@gnt.ai";

      form.addEventListener("submit", async (event) => {
        event.preventDefault();

        if (!emailInput.validity.valid) {
          form.reportValidity();
          return;
        }

        button.disabled = true;
        button.textContent = "Joining...";
        status.textContent = "";

        try {
          const response = await fetch(submitEndpoint, {
            method: "POST",
            headers: {
              Accept: "application/json",
            },
            body: new FormData(form),
          });

          if (!response.ok) {
            throw new Error("Submission failed");
          }

          emailInput.value = "";
          button.textContent = "Joined";
          status.textContent = "You are on the list.";

          window.setTimeout(() => {
            button.disabled = false;
            button.textContent = "Join the List";
          }, 2800);
        } catch (error) {
          button.disabled = false;
          button.textContent = "Join the List";
          status.textContent = "Could not submit. Email hello@gnt.ai and we will add you.";
        }
      });
    </script>
  </body>
</html>
