<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Give n Take helps pickleball players follow great hosts, get invited, and bring friends into better games."
    />
    <title>Give n Take</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="landing">
      <img class="court-bg" src="./assets/blue-hour-court.svg" alt="" />
      <div class="glow glow-one"></div>
      <div class="glow glow-two"></div>

      <nav class="nav" aria-label="Primary">
        <a class="brand" href="#top" aria-label="Give n Take home">
          <span class="brand-mark">GnT</span>
          <span>Give n Take</span>
        </a>
        <a class="nav-link" href="#early-list">Join early list</a>
      </nav>

      <section class="hero" id="top" aria-label="Give n Take landing page">
        <div class="hero-copy">
          <p class="eyebrow">Pickleball finds its people</p>
          <h1>Great pickleball starts with the right host.</h1>
          <p class="lede">
            Follow hosts you trust, get invited, and bring friends into the next game.
          </p>
        </div>

        <form class="signup" id="early-list" action="mailto:hello@gnt.ai" method="post" enctype="text/plain">
          <label>
            <span>First name</span>
            <input name="first-name" autocomplete="given-name" required />
          </label>
          <label>
            <span>Email</span>
            <input name="email" type="email" autocomplete="email" required />
          </label>
          <label>
            <span>Club or city</span>
            <input name="club-or-city" autocomplete="address-level2" required />
          </label>
          <button class="button" type="submit">Join early list</button>
        </form>
      </section>

      <footer class="footer">
        <span>For hosts, players, and clubs building better play.</span>
      </footer>
    </main>
  </body>
</html>
