<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Give n Take helps pickleball hosts build a following and fill the next great session."
    />
    <title>Give n Take</title>
    <link rel="stylesheet" href="./styles.css?v=20260619" />
  </head>
  <body>
    <main class="landing">
      <img class="court-bg" src="./assets/hero-host-court-premium-v2.jpg" alt="" />

      <nav class="nav" aria-label="Primary">
        <a class="brand" href="#top" aria-label="Give n Take home">
          <span class="brand-mark">GnT</span>
          <span>Give n Take</span>
        </a>
        <a class="nav-link" href="#early-list">Join the list</a>
      </nav>

      <section class="hero" id="top" aria-label="Give n Take landing page">
        <div class="hero-copy">
          <p class="eyebrow">For pickleball hosts</p>
          <h1>Great pickleball starts with the right host.</h1>
          <p class="lede">
            Build a following. Know who wants in. Fill the next great session.
          </p>
          <div class="signal-list" aria-label="Give n Take host benefits">
            <span>Followers</span>
            <span>Wish lists</span>
            <span>Referrals</span>
          </div>
        </div>

        <form class="signup" id="early-list" action="mailto:hello@gnt.ai" method="post" enctype="text/plain">
          <div class="signup-heading">
            <p>Early access</p>
            <h2>Join the host list.</h2>
          </div>
          <label>
            <span>Email</span>
            <input name="email" type="email" autocomplete="email" required />
          </label>
          <button class="button" type="submit">Request access</button>
        </form>
      </section>

      <footer class="footer">
        <span>Built for host-led pickleball communities.</span>
      </footer>
    </main>
  </body>
</html>
