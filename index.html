<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Give n Take helps pickleball hosts build followers, understand who wants to play, schedule faster, and grow through referrals."
    />
    <title>Give n Take</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="landing">
      <img class="court-bg" src="./assets/hero-court-editorial.jpg" alt="" />
      <div class="glow glow-one"></div>
      <div class="glow glow-two"></div>

      <nav class="nav" aria-label="Primary">
        <a class="brand" href="#top" aria-label="Give n Take home">
          <span class="brand-mark">GnT</span>
          <span>Give n Take</span>
        </a>
        <a class="nav-link" href="#early-list">Get early access</a>
      </nav>

      <section class="hero" id="top" aria-label="Give n Take landing page">
        <div class="hero-copy">
          <p class="eyebrow">Host-led pickleball</p>
          <h1>Great pickleball starts with the right host.</h1>
          <p class="lede">
            Hosts build followers, learn who wants to play, schedule faster, and grow through referrals.
          </p>
          <div class="signal-list" aria-label="Give n Take host benefits">
            <span>Followers</span>
            <span>Wish lists</span>
            <span>Referrals</span>
          </div>
        </div>

        <form class="signup" id="early-list" action="mailto:hello@gnt.ai" method="post" enctype="text/plain">
          <label>
            <span>First name</span>
            <input name="first-name" autocomplete="given-name" required />
          </label>
          <label>
            <span>Email</span>
            <input name="email" type="email" autocomplete="email" required />
          </label>
          <label>
            <span>Club or city</span>
            <input name="club-or-city" autocomplete="address-level2" required />
          </label>
          <button class="button" type="submit">Get early access</button>
        </form>
      </section>

      <footer class="footer">
        <span>For hosts, players, and clubs building better play.</span>
      </footer>
    </main>
  </body>
</html>
