<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Give n Take helps pickleball hosts create the feeling people come back for, lead with an open heart, stay connected, fill experiences, grow through referrals, and bring their community together."
    />
    <title>Give n Take</title>
    <link rel="stylesheet" href="./styles.css?v=20260620-2" />
  </head>
  <body>
    <main class="landing">
      <img class="hero-image" src="./assets/hero-generated-host-court.jpg" alt="" />

      <nav class="nav" aria-label="Primary">
        <a class="brand" href="#top" aria-label="Give n Take home">
          <span class="brand-mark">GnT</span>
          <span>Give n Take</span>
        </a>
      </nav>

      <section class="hero" id="top" aria-label="Give n Take landing page">
        <div class="hero-copy">
          <p class="eyebrow">Host-led pickleball</p>
          <h1>
            <span>The feeling people come back for.</span>
          </h1>

          <ol class="host-loop" aria-label="The Give n Take host loop">
            <li class="host-step">
              <span class="step-top">
                <span class="step-number">01</span>
                <span class="step-icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24" focusable="false">
                    <path d="M8.5 11.2a3.2 3.2 0 1 0 0-6.4 3.2 3.2 0 0 0 0 6.4Z" />
                    <path d="M15.8 10.4a2.6 2.6 0 1 0 0-5.2" />
                    <path d="M3.5 19.2c.6-3.2 2.4-5 5-5s4.4 1.8 5 5" />
                    <path d="M13.9 14.7c2.4.3 4 1.8 4.5 4.5" />
                  </svg>
                </span>
              </span>
              <span class="step-label">Lead with an open heart</span>
            </li>
            <li class="host-step">
              <span class="step-top">
                <span class="step-number">02</span>
                <span class="step-icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24" focusable="false">
                    <path d="M7.2 12.2a4.1 4.1 0 0 1 5.8-5.8l1.2 1.2" />
                    <path d="M16.8 11.8a4.1 4.1 0 0 1-5.8 5.8l-1.2-1.2" />
                    <path d="m9.6 14.4 4.8-4.8" />
                  </svg>
                </span>
              </span>
              <span class="step-label">Stay connected</span>
            </li>
            <li class="host-step">
              <span class="step-top">
                <span class="step-number">03</span>
                <span class="step-icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24" focusable="false">
                    <path d="M5 6.7h14v12.1H5Z" />
                    <path d="M8 4.5v4" />
                    <path d="M16 4.5v4" />
                    <path d="M5 10h14" />
                    <path d="m8.3 15 2.2 2.1 5.1-5.1" />
                  </svg>
                </span>
              </span>
              <span class="step-label">Fill your next great experience</span>
            </li>
            <li class="host-step">
              <span class="step-top">
                <span class="step-number">04</span>
                <span class="step-icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24" focusable="false">
                    <path d="M5 12h5.2c2.7 0 3.3-4.3 5.8-4.3H19" />
                    <path d="m16 4.7 3 3-3 3" />
                    <path d="M5 12h5.2c2.7 0 3.3 4.3 5.8 4.3H19" />
                    <path d="m16 13.3 3 3-3 3" />
                  </svg>
                </span>
              </span>
              <span class="step-label">Grow through referrals</span>
            </li>
            <li class="host-step">
              <span class="step-top">
                <span class="step-number">05</span>
                <span class="step-icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24" focusable="false">
                    <path d="M12 7.5a3 3 0 1 0 0 6 3 3 0 0 0 0-6Z" />
                    <path d="M5.2 15.2a2.4 2.4 0 1 0 0-4.8 2.4 2.4 0 0 0 0 4.8Z" />
                    <path d="M18.8 15.2a2.4 2.4 0 1 0 0-4.8 2.4 2.4 0 0 0 0 4.8Z" />
                    <path d="M7.4 12.8h2" />
                    <path d="M14.6 12.8h2" />
                    <path d="M8.1 18.7c.7-1.8 2-2.8 3.9-2.8s3.2 1 3.9 2.8" />
                  </svg>
                </span>
              </span>
              <span class="step-label">Bring your community together</span>
            </li>
          </ol>

          <form
            class="access"
            id="early-list"
            action="mailto:hello@gnt.ai?subject=Give%20n%20Take%20early%20access"
            method="post"
            enctype="text/plain"
          >
            <label for="email">Early access</label>
            <div class="access-row">
              <input id="email" name="email" type="email" autocomplete="email" placeholder="Email address" required />
              <button class="button" type="submit">Join the List</button>
            </div>
            <p class="form-status" id="form-status" role="status" aria-live="polite"></p>
          </form>
        </div>
      </section>
    </main>
    <script>
      const form = document.querySelector("#early-list");
      const emailInput = document.querySelector("#email");
      const status = document.querySelector("#form-status");
      const button = form.querySelector("button");

      form.addEventListener("submit", (event) => {
        event.preventDefault();

        if (!emailInput.validity.valid) {
          form.reportValidity();
          return;
        }

        const email = emailInput.value.trim();
        const subject = encodeURIComponent("Give n Take early access");
        const body = encodeURIComponent(
          `Please add me to the Give n Take early access list.\n\nEmail: ${email}`
        );

        button.textContent = "Email ready";
        status.textContent = "Email draft opened. If nothing happened, send your email to hello@gnt.ai.";
        window.location.href = `mailto:hello@gnt.ai?subject=${subject}&body=${body}`;
      });
    </script>
  </body>
</html>
