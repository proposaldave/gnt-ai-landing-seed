<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Give n Take helps pickleball hosts build a following, expand relationships, fill sessions, and grow through referrals."
    />
    <title>Give n Take</title>
    <link rel="stylesheet" href="./styles.css?v=20260619-5" />
  </head>
  <body>
    <main class="landing">
      <img class="hero-image" src="./assets/hero-generated-host-court.jpg" alt="" />

      <nav class="nav" aria-label="Primary">
        <a class="brand" href="#top" aria-label="Give n Take home">
          <span class="brand-mark">GnT</span>
          <span>Give n Take</span>
        </a>
        <a class="nav-link" href="#early-list">Join the list</a>
      </nav>

      <section class="hero" id="top" aria-label="Give n Take landing page">
        <div class="hero-copy">
          <p class="eyebrow">Host-led pickleball</p>
          <h1>
            <span>Fill the court</span>
            <span>with the right</span>
            <span>people.</span>
          </h1>
          <p class="lede">
            Build a following. Expand relationships. Fill the next great session. Grow through referrals.
          </p>

          <form class="access" id="early-list" action="mailto:hello@gnt.ai" method="post" enctype="text/plain">
            <label for="email">Early access</label>
            <div class="access-row">
              <input id="email" name="email" type="email" autocomplete="email" placeholder="Email address" required />
              <button class="button" type="submit">Request access</button>
            </div>
          </form>
        </div>
      </section>
    </main>
  </body>
</html>
