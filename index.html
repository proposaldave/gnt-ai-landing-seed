<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Give n Take helps pickleball hosts build a following, expand relationships, fill sessions, and grow through referrals."
    />
    <title>Give n Take</title>
    <link rel="stylesheet" href="./styles.css?v=20260619-2" />
  </head>
  <body>
    <main class="landing">
      <img class="court-bg" src="./assets/hero-host-court-premium-v2.jpg" alt="" />

      <nav class="nav" aria-label="Primary">
        <a class="brand" href="#top" aria-label="Give n Take home">
          <span class="brand-mark">GnT</span>
          <span>Give n Take</span>
        </a>
        <a class="nav-link" href="#early-list">Join the list</a>
      </nav>

      <section class="hero" id="top" aria-label="Give n Take landing page">
        <div class="hero-copy">
          <p class="eyebrow">Host-led pickleball</p>
          <h1>Great pickleball starts with the right host.</h1>
          <p class="lede">
            Build a following. Expand relationships. Fill the next great session. Grow through referrals.
          </p>

          <form class="access" id="early-list" action="mailto:hello@gnt.ai" method="post" enctype="text/plain">
            <label for="email">Early access</label>
            <div class="access-row">
              <input id="email" name="email" type="email" autocomplete="email" placeholder="Email address" required />
              <button class="button" type="submit">Request access</button>
            </div>
          </form>
        </div>

        <div class="product-scene" aria-label="Give n Take host network preview">
          <div class="court-card">
            <div class="court-line court-line-one"></div>
            <div class="court-line court-line-two"></div>
            <div class="court-line court-line-three"></div>
            <div class="net"></div>
          </div>

          <div class="network">
            <span class="link link-a"></span>
            <span class="link link-b"></span>
            <span class="link link-c"></span>
            <span class="link link-d"></span>
            <span class="node host-node">
              <strong>Host</strong>
              <small>session builder</small>
            </span>
            <span class="node node-followers">Followers</span>
            <span class="node node-wishlist">Wish lists</span>
            <span class="node node-feedback">Feedback</span>
            <span class="node node-referrals">Referrals</span>
          </div>

          <div class="session-panel">
            <div>
              <p>Next session</p>
              <strong>8 players want in</strong>
            </div>
            <span>Fill court</span>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
